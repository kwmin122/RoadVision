<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Slide 02 — 문제와 목표</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="slide">

  <div class="slide-header">
    <span class="section-badge">02</span>
    <h2>문제와 목표</h2>
    <span class="sidebar-tag">Problem &amp; Goal</span>
  </div>

  <div class="slide-body slide-body--row">

    <!-- LEFT -->
    <div class="col col--55" style="justify-content:space-between;">
      <ul class="bullets bullets--lg">
        <li>딥러닝(YOLO) <strong>없이</strong> — 고전 CV 기법만으로 구현</li>
        <li>목표: <strong>안정성·완성도</strong> — 무대에서 안 깨지는 시스템</li>
        <li>ADAS 핵심 기능 — <strong>차선 인식 + 차선 이탈 경고(LDW)</strong></li>
      </ul>
      <div class="accent-box" style="margin-top:auto;">
        화려한 기능보다 <strong>안 깨지는 완성도</strong>를 최우선으로
      </div>
    </div>

    <!-- RIGHT: input image -->
    <div class="col col--40" style="align-items:center; justify-content:center;">
      <div class="img-frame" style="width:100%; height:340px;">
        <img src="../assets/st01_input.png" alt="원본 대시캠 입력 영상">
      </div>
      <div class="caption">원본 대시캠 입력 프레임</div>
    </div>

  </div>

  <div class="slide-footer">
    <span>RoadVision — Classical CV 차선 인식</span>
    <span class="page-num">02 / 11</span>
  </div>

</div>
<!-- NOTES: 요즘 차선 인식은 대부분 딥러닝으로 합니다. 하지만 저는 이번 과제에서 일부러 YOLO 같은 딥러닝을 뺐습니다. Canny와 Hough, 임계처리, 모폴로지, 호모그래피처럼 수업에서 배운 고전 기법만으로 어디까지 안정적으로 만들 수 있는지, 그걸 목표로 잡았습니다. 화려한 기능보다, 무대에서 안 깨지는 완성도를 최우선으로 두었습니다. -->
</body>
</html>
